name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install Rokit tools
        run: rokit trust rojo-rbx/rojo && rokit trust UpliftGames/wally && rokit install

      - name: Build release
        run: rojo build release.project.json --output BallPhysics.rbxm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: BallPhysics.rbxm
          generate_release_notes: false
          body_path: CHANGELOG.md

      - name: Publish to Wally
        env:
          WALLY_TOKEN: ${{ secrets.WALLY_AUTH_TOKEN }}
        run: |
          mkdir -p ~/.wally
          printf "[tokens]\n\"https://api.wally.run/\" = \"%s\"" "$WALLY_TOKEN" >> ~/.wally/auth.toml
          wally publish
